<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация сотрудника — СУРВ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <script src="/js/face-api.min.js"></script>
  <script defer src="register.js"></script>
</head>
<body>
<div class="container">
  <a href="index.html" class="small">&larr; На главную</a>
  <h1>Регистрация сотрудника</h1>
  <p class="subtitle">Сделайте фото лица, чтобы сохранить биометрический шаблон.</p>

  <div class="layout-two-columns">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Камера и лицо</div>
        <span id="cameraStatus" class="tag">камера: нет</span>
      </div>
      <div class="video-wrapper">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
      </div>
      <div class="tags-row">
        <span id="modelsStatus" class="tag">модели: загружаются…</span>
        <span id="faceStatus" class="tag">лицо: нет</span>
      </div>
      <p class="small">Для работы нужно чётко видимое лицо в кадре. Фото не сохраняются, только числовой вектор лица.</p>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Данные сотрудника</div>
      </div>

      <form id="registerForm">
        <div class="form-row">
          <label for="name">Имя сотрудника</label>
          <input id="name" required placeholder="Например, Иван Петров">
        </div>
        <div class="form-row">
          <label for="schedule">График</label>
          <select id="schedule" required>
            <option value="5/2">5/2</option>
            <option value="2/2">2/2</option>
          </select>
        </div>
        <div class="form-row">
          <label for="rate">Ставка (₽/час)</label>
          <input id="rate" type="number" min="0" step="1" required placeholder="Например, 500">
        </div>

        <button type="submit" class="btn" id="btnRegister" disabled>Сохранить сотрудника</button>
        <div id="status" class="status info" style="display:none;"></div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
