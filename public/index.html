<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>СКУД / СУРВ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>СКУД / СУРВ</h1>
  <p class="subtitle">Учёт времени, биометрия, RFID-карта, кабинет бухгалтера</p>

  <div id="loggedInHint" class="panel" style="display: none;">
    <p class="small" id="loggedInLinks">Вы вошли в систему.</p>
  </div>

  <div class="cards">
    <a class="card" href="register.html">
      <h2>Регистрация</h2>
    </a>
    <a class="card" href="login.html">
      <h2>Вход</h2>
    </a>
    <a class="card" href="accountant.html" id="cardAccountant" style="display:none;">
      <h2>Кабинет бухгалтера</h2>
    </a>
  </div>

  <div class="footer-links">
    <button id="btnLogs" class="btn secondary" onclick="window.open('/logs-view.html','_blank')">Логи сервера</button>
  </div>
</div>

<script>
  (function () {
    var id = localStorage.getItem('surv_employee_id');
    var role = localStorage.getItem('surv_role');
    if (!id) return;
    document.getElementById('loggedInHint').style.display = 'block';
    var links = document.getElementById('loggedInLinks');
    if (role === 'accountant') {
      links.innerHTML =
        'Бухгалтер. <a href="accountant.html">Кабинет бухгалтера →</a>';
      document.getElementById('cardAccountant').style.display = '';
    } else {
      links.innerHTML =
        'Сотрудник. <a href="dashboard.html">Личный кабинет →</a>';
    }
  })();
</script>
</body>
</html>
